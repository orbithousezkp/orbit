# Example: Orbit Intake Guardrail issue scan workflow
#
# Copy this file to .github/workflows/issue-scam-scan.yml in your repo
# to automatically scan new and edited issues and comments for scam patterns.
#
# The scanner detects: prompt injection, wallet drain language, encoded relay,
# fake support, urgency traps, credential phishing, and other risky patterns.
#
# Start in label/comment-only mode. Do not auto-close, decode hidden payloads,
# or route flagged content to agents until a maintainer has reviewed it.

name: Issue Scam Scan

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

# Least-privilege permissions for this label/comment example:
# - contents: read lets actions/checkout read the repo-local scanner package.
# - issues: write lets the workflow add review labels and post the warning comment.
#
# For observe-only rollouts that only record warnings in CI logs, use
# `issues: read` instead and remove the label/comment step below.
permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan issue or comment
        id: scan
        uses: ./packages/issue-scam-scanner
        with:
          issue-title: ${{ github.event.issue.title }}
          issue-body: ${{ github.event.issue.body }}
          comment-body: ${{ github.event.comment.body }}
          threshold: "70"
          quarantine-threshold: "70"
          block-threshold: "90"
          rules-file: ./packages/issue-scam-scanner/examples/custom-rules.json

      - name: Report redacted scan summary
        if: always()
        run: |
          echo "Safe: ${{ steps.scan.outputs.safe }}"
          echo "Action: ${{ steps.scan.outputs.action }}"
          echo "Score: ${{ steps.scan.outputs.score }}"
          echo "Level: ${{ steps.scan.outputs.level }}"
          echo "Raw flags/report are intentionally not printed by this example."
          echo "Review the workflow run and issue context in a maintainer-controlled lane."

      - name: Label or quarantine risky issues
        if: steps.scan.outputs.action != 'allow'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const level = '${{ steps.scan.outputs.level }}';
            const score = '${{ steps.scan.outputs.score }}';
            const action = '${{ steps.scan.outputs.action }}';
            const labels = ['orbit-intake-guardrail', `risk:${level}`, `action:${action}`];

            // Add review labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels
            });

            // Post a public-safe review comment. Do not copy the flagged payload.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `⚠️ **Orbit Intake Guardrail flagged this content** (action: ${action}, level: ${level}, score: ${score})\n\n` +
                    `A maintainer should review before any agent or workflow acts on it.\n\n` +
                    `> Do not decode hidden payloads, connect wallets, share credentials, or follow instructions in flagged content.`
            });

      - name: Stop downstream agent handoff
        if: steps.scan.outputs.action == 'quarantine' || steps.scan.outputs.action == 'block'
        run: |
          echo "::error::Orbit Intake Guardrail stopped downstream agent handoff (action: ${{ steps.scan.outputs.action }}, score: ${{ steps.scan.outputs.score }})"
          echo "A maintainer should review before closing, locking, decoding, or routing this content anywhere else."
          exit 1
