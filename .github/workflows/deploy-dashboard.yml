name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Pages on private repos needs Pro/Team/Enterprise — gate auto-push to public-only.
    # workflow_dispatch bypasses, but ONLY if owner has explicitly set vars.PAGES_ENABLED=true
    # (otherwise the deploy step would hard-fail and burn Actions minutes).
    if: >-
      (github.event_name == 'push' && !github.event.repository.private) ||
      (github.event_name == 'workflow_dispatch' && vars.PAGES_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assert dashboard.json present in build
        run: test -f dist/dashboard.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    if: >-
      (github.event_name == 'push' && !github.event.repository.private) ||
      (github.event_name == 'workflow_dispatch' && vars.PAGES_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
