name: Nightly Healthcheck

# Runs once a day off-peak (4:17 UTC, off the :00 minute mark so this
# repo doesn't pile onto the planetary cron rush). Verifies the cycle
# is alive, tests + lint still pass, no Layer 1 launch-persist marker.
# On any FAIL, opens (or comments on the latest open) an alert issue.

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: orbit-healthcheck
  cancel-in-progress: false

jobs:
  check:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.actor == vars.ORBIT_OWNER_USERNAME)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint

      - name: Tests
        id: tests
        run: npm test

      - name: Health (file presence)
        id: health
        run: npm run health

      - name: Healthcheck (freshness + spikes + markers)
        id: healthcheck
        # tee preserves the lines for the issue body while still failing
        # the step on non-zero exit.
        run: |
          mkdir -p .healthcheck
          if npm run orbit:healthcheck 2>&1 | tee .healthcheck/output.txt; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Open or update alert issue (on failure)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUTPUT_FILE=.healthcheck/output.txt
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "no healthcheck output captured" > "$OUTPUT_FILE"
          fi
          BODY_FILE=.healthcheck/body.md
          {
            echo "## Nightly healthcheck failed"
            echo ""
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo '```'
            cat "$OUTPUT_FILE"
            echo '```'
            echo ""
            echo "See \`src/cli/orbit-healthcheck.js\` for what each check means."
          } > "$BODY_FILE"

          # Find an existing open alert issue. Idempotent so successive
          # failures don't flood the issue list.
          existing=$(gh issue list \
            --label "orbit:healthcheck-fail" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$BODY_FILE"
            echo "commented on issue #$existing"
          else
            gh issue create \
              --title "Nightly healthcheck failed" \
              --label "orbit:healthcheck-fail" \
              --body-file "$BODY_FILE"
          fi
